services:
  postgres:
    image: postgres:16
    container_name: veterinaria_db
    restart: always
    environment:
      POSTGRES_USER: vet_user
      POSTGRES_PASSWORD: vet_password
      POSTGRES_DB: veterinaria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: