<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citas | Sistema Veterinario</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      theme: {

            surface: "#f8f9ff",
            "on-primary-container": "#eeefff",
            "surface-dim": "#cbdbf5",
            "surface-bright": "#f8f9ff",
            "error-container": "#ffdad6",
            "on-tertiary-fixed-variant": "#653e00",
            "tertiary-fixed-dim": "#ffb95f",
            "surface-container-highest": "#d3e4fe",
            "tertiary-fixed": "#ffddb8",
            "tertiary-container": "#996100",
            background: "#f8f9ff",
            "on-secondary": "#ffffff",
            "on-primary-fixed": "#00174b",
            "on-error-container": "#93000a",
            "on-surface": "#0b1c30",
            "surface-container-high": "#dce9ff",
            "on-primary-fixed-variant": "#003ea8",
            primary: "#004ac6",
            "surface-container-low": "#eff4ff",
            "secondary-container": "#6cf8bb",
            "secondary-fixed": "#6ffbbe",
            "on-background": "#0b1c30",
            "outline-variant": "#c3c6d7",
            "primary-fixed-dim": "#b4c5ff",
            "surface-tint": "#0053db",
            "on-surface-variant": "#434655",
            outline: "#737686",
            "inverse-surface": "#213145",
            secondary: "#006c49",
            error: "#ba1a1a",
            "on-error": "#ffffff",
            "secondary-fixed-dim": "#4edea3",
            "primary-container": "#2563eb",
            "surface-container": "#e5eeff",
            "on-secondary-fixed-variant": "#005236",
            "on-tertiary-fixed": "#2a1700",
            "primary-fixed": "#dbe1ff",
            "on-tertiary": "#ffffff",
            "inverse-on-surface": "#eaf1ff",
            "on-primary": "#ffffff",
            "surface-variant": "#d3e4fe"
          }
        }
      }
    };
  </script>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/citas.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img
        class="sidebar-logo"
        alt="Logo de la veterinaria"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeBU2rWXY5RNAiXS-hFVwXTVv3Dar18FL0kjdYO3AaWnga3sl2O2rLQurA3O41jdXQhfrt7YBSGcd7wbwYALsfQwxe1tYZf8tsmVI9vCYBiqMNMnO2hXhDv0FYHDbMjxXkjXHFSOVLSaK_-QmSmVq5AhwXwhO6ts92zNFW50vSMjqlfQogiNyvdPFDrepgVh5IbfZKtNHvfCfKRU46peKpYmbBaixonXEnLu-FQsMt6vHoEB9rJ00u3uOBBFOm3gcf2F3znvJtvLZJ"
      />
      <div>
        <h1 class="sidebar-title">Paws &amp; Cross</h1>
        <p class="sidebar-subtitle">Clinica Veterinaria</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a class="sidebar-link" href="./dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span>Dashboard</span>
      </a>
      <a class="sidebar-link" href="./pacientes.html">
        <span class="material-symbols-outlined">pets</span>
        <span>Pacientes</span>
      </a>
      <a class="sidebar-link" href="./expedientes.html">
        <span class="material-symbols-outlined">description</span>
        <span>Expedientes</span>
      </a>
      <a class="sidebar-link sidebar-link-active" href="./citas.html">
        <span class="material-symbols-outlined">calendar_month</span>
        <span>Citas</span>
      </a>
    </nav>
  </aside>

  <header class="topbar">
    <div class="topbar-actions">
      <div class="notification-wrapper">
        <button id="btnNotificaciones" class="topbar-icon-btn relative" type="button" aria-label="Abrir notificaciones">
          <span class="material-symbols-outlined">notifications</span>
          <span id="notificacionBadge" class="notification-badge hidden">0</span>
        </button>

        <div id="dropdownNotificaciones" class="notification-dropdown hidden">
          <h4 class="notification-title">Notificaciones</h4>
          <div id="listaNotificaciones" class="notification-list"></div>
        </div>
      </div>
      <button class="topbar-icon-btn" type="button" aria-label="Actividad reciente">
        <span class="material-symbols-outlined">chat_bubble</span>
      </button>
      <button class="topbar-icon-btn" type="button" aria-label="Ayuda">
        <span class="material-symbols-outlined">help</span>
      </button>
    </div>

    <div class="topbar-divider"></div>

    <div class="user-summary">
      <p class="user-role">Administrador</p>
      <p class="user-system">Sistema Veterinario</p>
    </div>
  </header>

  <main class="app-shell">
    <div class="citas-container">
      <section class="citas-layout">
        <section class="calendar-card">
          <div class="calendar-header">
            <div>
              <h2 class="calendar-title">Calendario de citas</h2>
              <p class="calendar-subtitle">Administra las citas registradas y próximas visitas.</p>
            </div>

            <button id="btnAbrirModalCita" class="btn-primary" type="button">
              <span class="material-symbols-outlined">add</span>
              Nueva cita
            </button>
          </div>

          <div class="calendar-wrapper">
            <div id="calendar"></div>
          </div>
        </section>

        <aside class="appointments-sidebar">
          <section class="sidebar-card">
            <div class="sidebar-card-header">
              <h3 class="sidebar-card-title">Agenda de hoy</h3>
              <span id="contadorAgenda" class="sidebar-counter">0 citas</span>
            </div>

            <div id="agendaHoy" class="appointment-list"></div>
          </section>

          <section class="sidebar-card sidebar-card-grow">
            <h3 class="sidebar-card-title">Próximas citas</h3>
            <div id="proximasCitasSidebar" class="appointment-list"></div>
          </section>
        </aside>
      </section>
    </div>
  </main>

  <button class="mobile-fab md:hidden" type="button" aria-label="Nueva cita">
    <span class="material-symbols-outlined">add</span>
  </button>

  <div id="modalCita" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Nueva cita</h2>

        <button id="btnCerrarModalCita" class="modal-close-btn" type="button" aria-label="Cerrar modal">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <form id="formCita" class="modal-form">
        <select name="patient_id" id="selectPaciente" required class="form-field">
          <option value="">Selecciona un paciente</option>
        </select>

        <input type="datetime-local" name="appointment_date" required class="form-field" />
        <input type="text" name="reason" placeholder="Motivo de la cita" class="form-field" />

        <select name="status" class="form-field">
          <option value="Agendada">Agendada</option>
          <option value="Completada">Completada</option>
          <option value="Cancelada">Cancelada</option>
        </select>

        <textarea name="notes" placeholder="Notas" class="form-field"></textarea>

        <div class="modal-actions-between">
          <button type="button" id="btnEliminarCita" class="btn-danger hidden">
            Eliminar
          </button>

          <div class="modal-actions">
            <button type="button" id="btnCancelarCita" class="btn-outline">
              Cancelar
            </button>

            <button type="submit" class="btn-primary">
              Guardar cita
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <script src="./js/shared/notifications.js"></script>
  <script src="./js/citas/config.js"></script>
  <script src="./js/citas/api.js"></script>
  <script src="./js/citas/utils.js"></script>
  <script src="./js/citas/calendar.js"></script>
  <script src="./js/citas/modal.js"></script>
  <script src="./js/citas/agenda.js"></script>
  <script src="./js/citas/upcoming.js"></script>
  <script src="./js/citas/citas.js"></script>
</body>
</html>
